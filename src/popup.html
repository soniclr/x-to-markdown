<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X to Markdown</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>X to Markdown</h1>
      <p class="subtitle">在 X/Twitter 帖子上点击保存按钮，将内容导出为 Markdown。</p>

      <section class="card">
        <h2>保存文件夹</h2>
        <div class="folder-row">
          <span id="folder-name" class="folder-name">首次保存时会自动弹出选择</span>
          <button id="change-folder" type="button">更换</button>
        </div>
        <p class="hint-text">选择 Obsidian vault 内的文件夹，文件会直接出现在 Obsidian 中。</p>
      </section>

      <section class="card">
        <h2>Markdown 选项</h2>
        <label class="radio-label">
          <input type="checkbox" id="include-frontmatter" checked />
          <span>包含 YAML frontmatter</span>
        </label>
        <label class="radio-label">
          <input type="checkbox" id="include-metrics" checked />
          <span>包含互动数据</span>
        </label>
        <label class="radio-label">
          <input type="checkbox" id="include-media" checked />
          <span>包含媒体链接</span>
        </label>
      </section>

      <section class="card">
        <h2>最近保存</h2>
        <p id="last-save">暂无记录</p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
